<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HiredBack — CV Diagnostic & Tailoring</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0D1117;
      --card: #161B22;
      --card2: #1C2128;
      --border: #30363D;
      --accent: #F0A500;
      --accent-dim: rgba(240,165,0,0.12);
      --text: #F0EDE6;
      --muted: #8B949E;
      --success: #3FB950;
      --danger: #F85149;
      --warn: #D29922;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .app-wrap { position: relative; z-index: 1; }

    /* Glow behind hero text */
    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,165,0,0.08) 0%, transparent 70%);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #0D1117;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      padding: 14px 28px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: #FFB800; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(240,165,0,0.25); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .card2 {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--card2);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .progress-bar-bg {
      background: var(--border);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), #FFD166);
      transition: width 0.6s ease;
    }

    .score-ring {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-high { background: rgba(248,81,73,0.15); color: var(--danger); }
    .badge-medium { background: rgba(210,153,34,0.15); color: var(--warn); }
    .badge-low { background: rgba(63,185,80,0.15); color: var(--success); }

    .step-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }
    .step-dot.active { background: var(--accent); box-shadow: 0 0 8px rgba(240,165,0,0.5); }
    .step-dot.done { background: var(--success); }

    textarea {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 14px;
      resize: vertical;
      min-height: 180px;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .cv-output {
      white-space: pre-wrap;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--text);
    }

    /* Processing dots */
    .dot-pulse span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 3px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

    /* Fade in */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .fade-up-delay-1 { animation: fadeUp 0.5s 0.1s ease both; }
    .fade-up-delay-2 { animation: fadeUp 0.5s 0.2s ease both; }
    .fade-up-delay-3 { animation: fadeUp 0.5s 0.3s ease both; }
    .fade-up-delay-4 { animation: fadeUp 0.5s 0.4s ease both; }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* Pricing cards */
    .price-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--card2);
    }
    .price-card:hover { border-color: var(--accent); }
    .price-card.selected { border-color: var(--accent); background: var(--accent-dim); }

    /* CV guide card */
    .cv-tip { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .cv-tip-icon { color: var(--success); font-size: 1rem; margin-top: 2px; flex-shrink: 0; }

    input[type="file"] { display: none; }

    .char-count { font-size: 0.75rem; color: var(--muted); text-align: right; margin-top: 6px; }

    .scrollable { max-height: 60vh; overflow-y: auto; padding-right: 4px; }
    .scrollable::-webkit-scrollbar { width: 4px; }
    .scrollable::-webkit-scrollbar-track { background: transparent; }
    .scrollable::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ─── Config ───────────────────────────────────────────────────
const DEMO_MODE = true; // Set to false when Stripe is integrated
const PROCESSING_MESSAGES = [
  "Reading your CV...",
  "Analysing against the job ad...",
  "Checking ATS compatibility...",
  "Identifying what's holding you back...",
  "Rewriting to modern UK standards...",
  "Almost there — polishing your results..."
];

// ─── SVG Icons ────────────────────────────────────────────────
const IconUpload = () => (
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
);
const IconCheck = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);
const IconCopy = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
  </svg>
);
const IconDownload = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
  </svg>
);
const IconArrow = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
  </svg>
);
const IconAlert = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
);

// ─── ATS Score Ring ────────────────────────────────────────────
function ScoreRing({ score, label, color }) {
  const r = 44;
  const circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;
  const col = score >= 70 ? '#3FB950' : score >= 45 ? '#D29922' : '#F85149';
  return (
    <div style={{ textAlign: 'center' }}>
      <div className="score-ring" style={{ width: 110, height: 110, margin: '0 auto' }}>
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle cx="55" cy="55" r={r} fill="none" stroke="var(--border)" strokeWidth="8"/>
          <circle cx="55" cy="55" r={r} fill="none" stroke={col} strokeWidth="8"
            strokeDasharray={circ} strokeDashoffset={offset}
            strokeLinecap="round" transform="rotate(-90 55 55)"
            style={{ transition: 'stroke-dashoffset 1s ease' }}
          />
        </svg>
        <div style={{ position: 'absolute', textAlign: 'center' }}>
          <div style={{ fontSize: '1.6rem', fontWeight: 700, color: col, fontFamily: 'Playfair Display, serif' }}>{score}</div>
          <div style={{ fontSize: '0.65rem', color: 'var(--muted)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>/ 100</div>
        </div>
      </div>
      <div style={{ marginTop: 8, fontSize: '0.8rem', color: 'var(--muted)', fontWeight: 500 }}>{label}</div>
    </div>
  );
}

// ─── Step Indicators ──────────────────────────────────────────
function Steps({ current }) {
  const steps = ['upload', 'jobad', 'processing', 'results'];
  const idx = steps.indexOf(current);
  return (
    <div className="step-indicator" style={{ justifyContent: 'center', marginBottom: 24 }}>
      {steps.map((s, i) => (
        <div key={s} className={`step-dot ${i < idx ? 'done' : i === idx ? 'active' : ''}`} />
      ))}
    </div>
  );
}

// ─── Welcome Screen ───────────────────────────────────────────
function WelcomeScreen({ onStart }) {
  return (
    <div style={{ maxWidth: 480, margin: '0 auto', padding: '40px 20px' }}>
      <div style={{ position: 'relative' }}>
        <div className="hero-glow" />
        <div className="fade-up" style={{ textAlign: 'center', marginBottom: 40 }}>
          <div style={{ 
            display: 'inline-flex', alignItems: 'center', gap: 8,
            background: 'var(--accent-dim)', border: '1px solid rgba(240,165,0,0.25)',
            borderRadius: 99, padding: '6px 14px', marginBottom: 24,
            fontSize: '0.78rem', fontWeight: 600, color: 'var(--accent)',
            letterSpacing: '0.05em', textTransform: 'uppercase'
          }}>
            <span>●</span> UK Job Market Specialist
          </div>
          <h1 style={{ fontSize: 'clamp(2rem, 8vw, 2.8rem)', lineHeight: 1.15, marginBottom: 20, color: 'var(--text)' }}>
            Not getting<br/><em style={{ color: 'var(--accent)' }}>interviews?</em><br/>Let's fix that.
          </h1>
          <p style={{ color: 'var(--muted)', fontSize: '1rem', lineHeight: 1.7, maxWidth: 360, margin: '0 auto 16px' }}>
            Your employer should be helping you with your CV when you're made redundant. If they're not — <strong style={{ color: 'var(--text)' }}>we will.</strong>
          </p>
          <p style={{ color: 'var(--muted)', fontSize: '0.9rem', lineHeight: 1.6, maxWidth: 360, margin: '0 auto' }}>
            Upload your CV, paste a job ad, and we'll tell you exactly why you're not getting interviews — then rewrite it to get you noticed.
          </p>
        </div>

        {/* How it works */}
        <div className="card fade-up-delay-1" style={{ marginBottom: 20 }}>
          <div style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--accent)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 16 }}>How it works</div>
          {[
            ['📄', 'Upload your CV', 'PDF or Word document — we read both'],
            ['📋', 'Paste the job ad', 'Copy it straight from the job listing'],
            ['🔍', 'Get your diagnosis', 'We reveal why you\'re being overlooked'],
            ['✨', 'Receive your rewritten CV', 'Tailored, modern, and ATS-optimised'],
          ].map(([icon, title, desc], i) => (
            <div key={i} style={{ display: 'flex', gap: 14, marginBottom: i < 3 ? 16 : 0 }}>
              <div style={{ fontSize: '1.3rem', flexShrink: 0, marginTop: 2 }}>{icon}</div>
              <div>
                <div style={{ fontWeight: 600, fontSize: '0.9rem', marginBottom: 2 }}>{title}</div>
                <div style={{ color: 'var(--muted)', fontSize: '0.82rem' }}>{desc}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Social proof */}
        <div className="fade-up-delay-2" style={{ 
          background: 'var(--accent-dim)', border: '1px solid rgba(240,165,0,0.2)', 
          borderRadius: 12, padding: 16, marginBottom: 24, fontSize: '0.85rem',
          color: 'var(--text)', lineHeight: 1.6
        }}>
          <strong style={{ color: 'var(--accent)' }}>Did you know?</strong> Most CVs are rejected by automated software before a human ever reads them. HiredBack tells you your ATS score before and after — so you can see the difference.
        </div>

        <div className="fade-up-delay-3" style={{ textAlign: 'center' }}>
          <button className="btn-primary" onClick={onStart} style={{ width: '100%', fontSize: '1.05rem', padding: '16px' }}>
            Start My CV Diagnosis →
          </button>
          <div style={{ marginTop: 12, color: 'var(--muted)', fontSize: '0.8rem' }}>
            £4 per use · £15 for 10 uses · Results in under 2 minutes
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Payment Screen ───────────────────────────────────────────
function PaymentScreen({ onPay }) {
  const [selected, setSelected] = useState('single');

  return (
    <div style={{ maxWidth: 480, margin: '0 auto', padding: '32px 20px' }}>
      <div className="fade-up" style={{ marginBottom: 28 }}>
        <h2 style={{ fontSize: '1.6rem', marginBottom: 8 }}>Choose your plan</h2>
        <p style={{ color: 'var(--muted)', fontSize: '0.9rem' }}>One-off payment. No subscription. No nonsense.</p>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 24 }}>
        <div className={`price-card fade-up-delay-1 ${selected === 'single' ? 'selected' : ''}`} onClick={() => setSelected('single')}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontWeight: 600, marginBottom: 4 }}>Single use</div>
              <div style={{ color: 'var(--muted)', fontSize: '0.83rem' }}>One CV tailored to one job ad</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '1.5rem', fontWeight: 700, fontFamily: 'Playfair Display, serif', color: 'var(--accent)' }}>£4</div>
            </div>
          </div>
        </div>

        <div className={`price-card fade-up-delay-2 ${selected === 'bundle' ? 'selected' : ''}`} onClick={() => setSelected('bundle')} style={{ position: 'relative' }}>
          <div style={{ 
            position: 'absolute', top: -10, right: 14,
            background: 'var(--accent)', color: '#0D1117', 
            fontSize: '0.68rem', fontWeight: 700, padding: '3px 10px', borderRadius: 99,
            letterSpacing: '0.05em', textTransform: 'uppercase'
          }}>Best value</div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontWeight: 600, marginBottom: 4 }}>10 uses bundle</div>
              <div style={{ color: 'var(--muted)', fontSize: '0.83rem' }}>Apply to multiple roles — £1.50 per use</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '1.5rem', fontWeight: 700, fontFamily: 'Playfair Display, serif', color: 'var(--accent)' }}>£15</div>
            </div>
          </div>
        </div>
      </div>

      {DEMO_MODE && (
        <div className="fade-up-delay-3" style={{ 
          background: 'rgba(63,185,80,0.08)', border: '1px solid rgba(63,185,80,0.25)',
          borderRadius: 10, padding: 14, marginBottom: 20, fontSize: '0.82rem', color: 'var(--muted)'
        }}>
          <strong style={{ color: 'var(--success)' }}>Demo mode:</strong> Payment is bypassed. In production, this connects to Stripe.
        </div>
      )}

      <button className="btn-primary fade-up-delay-4" style={{ width: '100%', padding: '16px' }}
        onClick={() => onPay(selected)}>
        {DEMO_MODE ? 'Continue →' : `Pay with Stripe — ${selected === 'single' ? '£4' : '£15'}`}
      </button>

      <div style={{ marginTop: 16, color: 'var(--muted)', fontSize: '0.78rem', textAlign: 'center', lineHeight: 1.6 }}>
        🔒 Secure payment · Your CV is never stored · Results delivered instantly
      </div>
    </div>
  );
}

// ─── Upload Screen ────────────────────────────────────────────
function UploadScreen({ onUpload }) {
  const [dragging, setDragging] = useState(false);
  const [file, setFile] = useState(null);
  const [error, setError] = useState('');
  const fileRef = useRef();

  const ALLOWED = ['application/pdf', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
  const ALLOWED_EXT = ['.pdf', '.docx'];

  const validate = (f) => {
    if (!f) return false;
    const ext = f.name.toLowerCase();
    const valid = ALLOWED.includes(f.type) || ext.endsWith('.pdf') || ext.endsWith('.docx');
    if (!valid) { setError('Please upload a PDF or Word (.docx) file.'); return false; }
    if (f.size > 10 * 1024 * 1024) { setError('File must be under 10MB.'); return false; }
    setError('');
    return true;
  };

  const handleFile = (f) => { if (validate(f)) setFile(f); };
  const onDrop = (e) => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) handleFile(f); };
  const onDragOver = (e) => { e.preventDefault(); setDragging(true); };
  const onDragLeave = () => setDragging(false);

  const proceed = () => { if (file) onUpload(file); };

  return (
    <div style={{ maxWidth: 480, margin: '0 auto', padding: '32px 20px' }}>
      <Steps current="upload" />
      <div className="fade-up" style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: '1.6rem', marginBottom: 8 }}>Upload your CV</h2>
        <p style={{ color: 'var(--muted)', fontSize: '0.9rem', lineHeight: 1.6 }}>
          Don't worry about the format — we accept both PDF and Word documents.
        </p>
      </div>

      <div className={`upload-zone fade-up-delay-1 ${dragging ? 'drag-over' : ''}`}
        onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
        onClick={() => fileRef.current.click()}
        style={{ marginBottom: 16, color: file ? 'var(--text)' : 'var(--muted)' }}
      >
        <input ref={fileRef} type="file" accept=".pdf,.docx" onChange={e => handleFile(e.target.files[0])} />
        {file ? (
          <div>
            <div style={{ fontSize: '2rem', marginBottom: 10 }}>✅</div>
            <div style={{ fontWeight: 600, marginBottom: 4, color: 'var(--text)' }}>{file.name}</div>
            <div style={{ fontSize: '0.8rem', color: 'var(--muted)' }}>{(file.size / 1024).toFixed(0)} KB · Tap to change</div>
          </div>
        ) : (
          <div>
            <div style={{ color: 'var(--accent)', marginBottom: 12 }}><IconUpload /></div>
            <div style={{ fontWeight: 600, marginBottom: 6 }}>Tap to upload your CV</div>
            <div style={{ fontSize: '0.82rem', color: 'var(--muted)' }}>PDF or Word (.docx) · Max 10MB</div>
          </div>
        )}
      </div>

      {error && (
        <div style={{ 
          display: 'flex', alignItems: 'center', gap: 8,
          color: 'var(--danger)', fontSize: '0.85rem', marginBottom: 16 
        }}>
          <IconAlert /> {error}
        </div>
      )}

      <div className="card2 fade-up-delay-2" style={{ marginBottom: 24, fontSize: '0.82rem', color: 'var(--muted)', lineHeight: 1.6 }}>
        <strong style={{ color: 'var(--text)' }}>📱 On your phone?</strong> Tap above and choose your CV from Files, Google Drive, or any cloud storage app.
      </div>

      <button className="btn-primary" style={{ width: '100%', padding: '16px' }}
        disabled={!file} onClick={proceed}>
        Next — Add job ad →
      </button>

// ─── Results Screen ───────────────────────────────────────────
function ResultsScreen({ results, onReset, onViewGuide }) {
  const [copied, setCopied] = useState(false);
  const [tab, setTab] = useState('diagnostic');

  const copy = () => {
    navigator.clipboard.writeText(results.rewritten_cv);
    setCopied(true);
    setTimeout(() => setCopied(false), 2500);
  };

  const download = () => {
    const blob = new Blob([results.rewritten_cv], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'my-rewritten-cv.txt'; a.click();
    URL.revokeObjectURL(url);
  };

  const impactColor = (impact) => {
    if (impact === 'high') return 'badge-high';
    if (impact === 'medium') return 'badge-medium';
    return 'badge-low';
  };

  const scoreDiff = results.ats_score_after - results.ats_score_before;

  return (
    <div style={{ maxWidth: 480, margin: '0 auto', padding: '32px 20px' }}>
      <div className="fade-up" style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: '1.6rem', marginBottom: 6 }}>Your results are in</h2>
        <p style={{ color: 'var(--muted)', fontSize: '0.88rem' }}>Here's an honest breakdown of what we found.</p>
      </div>

      {/* ATS Scores */}
      <div className="card fade-up-delay-1" style={{ marginBottom: 20 }}>
        <div style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--accent)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 20, textAlign: 'center' }}>
          ATS Compatibility Score
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: 16 }}>
          <ScoreRing score={results.ats_score_before} label="Before" />
          <div style={{ textAlign: 'center' }}>
            <div style={{ 
              background: scoreDiff > 0 ? 'rgba(63,185,80,0.15)' : 'rgba(248,81,73,0.15)',
              color: scoreDiff > 0 ? 'var(--success)' : 'var(--danger)',
              borderRadius: 8, padding: '6px 10px', fontSize: '1rem', fontWeight: 700
            }}>
              {scoreDiff > 0 ? '+' : ''}{scoreDiff}
            </div>
            <div style={{ fontSize: '0.7rem', color: 'var(--muted)', marginTop: 4 }}>points</div>
          </div>
          <ScoreRing score={results.ats_score_after} label="After" />
        </div>
      </div>

      {/* Tab switcher */}
      <div className="fade-up-delay-2" style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        {['diagnostic', 'cv'].map(t => (
          <button key={t} onClick={() => setTab(t)} style={{
            flex: 1, padding: '10px', borderRadius: 8, border: 'none', cursor: 'pointer',
            fontFamily: 'DM Sans, sans-serif', fontWeight: 600, fontSize: '0.85rem',
            background: tab === t ? 'var(--accent)' : 'var(--card2)',
            color: tab === t ? '#0D1117' : 'var(--muted)',
            transition: 'all 0.2s'
          }}>
            {t === 'diagnostic' ? '🔍 Diagnosis' : '📄 Rewritten CV'}
          </button>
        ))}
      </div>

      {tab === 'diagnostic' && (
        <div className="fade-up">
          <div className="card" style={{ marginBottom: 16 }}>
            <div style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--accent)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 16 }}>
              Why you weren't getting interviews
            </div>
            <div className="scrollable">
              {results.diagnostic.map((item, i) => (
                <div key={i} style={{ 
                  padding: '14px 0', 
                  borderBottom: i < results.diagnostic.length - 1 ? '1px solid var(--border)' : 'none' 
                }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, marginBottom: 6 }}>
                    <div style={{ fontWeight: 600, fontSize: '0.88rem' }}>{item.category}</div>
                    <span className={`badge ${impactColor(item.impact)}`}>
                      {item.impact}
                    </span>
                  </div>
                  <div style={{ color: 'var(--muted)', fontSize: '0.83rem', lineHeight: 1.6 }}>{item.issue}</div>
                </div>
              ))}
            </div>
          </div>
          <button className="btn-ghost" style={{ width: '100%', marginBottom: 8 }} onClick={onViewGuide}>
            📘 View Modern CV Guide
          </button>
        </div>
      )}

      {tab === 'cv' && (
        <div className="fade-up">
          <div className="card" style={{ marginBottom: 12 }}>
            <div style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--accent)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 16 }}>
              Your rewritten CV
            </div>
            <div className="scrollable">
              <div className="cv-output">{results.rewritten_cv}</div>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
            <button className="btn-ghost" style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }} onClick={copy}>
              {copied ? <><IconCheck /> Copied!</> : <><IconCopy /> Copy</>}
            </button>
            <button className="btn-ghost" style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }} onClick={download}>
              <IconDownload /> Download
            </button>
          </div>
          <div style={{ fontSize: '0.78rem', color: 'var(--muted)', textAlign: 'center', lineHeight: 1.5 }}>
            Output is clean text. Word document export coming in v2.
          </div>
        </div>
      )}

      <hr className="divider" style={{ margin: '24px 0' }} />

      <div style={{ textAlign: 'center' }}>
        <div style={{ color: 'var(--muted)', fontSize: '0.85rem', marginBottom: 12 }}>Got another role to apply for?</div>
        <button className="btn-primary" style={{ width: '100%', padding: '14px' }} onClick={onReset}>
          Use another credit →
        </button>
      </div>
    </div>
  );
}

// ─── Modern CV Guide ──────────────────────────────────────────
function CVGuide({ onBack }) {
  const tips = [
    { icon: '🚫', text: 'No photo or date of birth — these are not used in modern UK CVs and can trigger unconscious bias.' },
    { icon: '🚫', text: 'No "References available on request" — this is assumed and wastes space.' },
    { icon: '🚫', text: 'No objective statement — replace it with a punchy personal profile (3–4 lines max).' },
    { icon: '✅', text: 'Skills section near the top — ATS systems scan for keywords early in the document.' },
    { icon: '✅', text: 'Quantify your achievements — "Managed a team" is weak. "Managed a team of 8, reducing costs by 15%" is strong.' },
    { icon: '✅', text: 'Single-column layout — two-column designs often break ATS parsers.' },
    { icon: '✅', text: 'Keep it to 2 pages — anything more and hiring managers won\'t read it.' },
    { icon: '✅', text: 'Use the same keywords as the job ad — mirror their language exactly.' },
    { icon: '✅', text: 'Modern fonts — Calibri, Georgia, or Garamond at 10–12pt. Not Times New Roman.' },
    { icon: '✅', text: 'Tailor for every application — a generic CV sent to 50 jobs gets 0 responses.' },
  ];

  const layout = [
    'Personal profile (3–4 lines)',
    'Core skills / Key competencies',
    'Work experience (most recent first)',
    'Education & qualifications',
    'Professional development / training',
  ];

  return (
    <div style={{ maxWidth: 480, margin: '0 auto', padding: '32px 20px' }}>
      <div className="fade-up" style={{ marginBottom: 28 }}>
        <div style={{ 
          display: 'inline-block', background: 'var(--accent-dim)', 
          border: '1px solid rgba(240,165,0,0.2)', borderRadius: 8, 
          padding: '4px 12px', fontSize: '0.75rem', color: 'var(--accent)', 
          fontWeight: 600, letterSpacing: '0.05em', textTransform: 'uppercase', marginBottom: 12
        }}>Modern CV Guide</div>
        <h2 style={{ fontSize: '1.6rem', marginBottom: 8 }}>What a 2024 CV looks like</h2>
        <p style={{ color: 'var(--muted)', fontSize: '0.88rem', lineHeight: 1.6 }}>
          Your rewritten CV follows all of these conventions. This guide explains why each one matters.
        </p>
      </div>

      {/* Layout order */}
      <div className="card fade-up-delay-1" style={{ marginBottom: 20 }}>
        <div style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--accent)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 16 }}>
          Recommended layout order
        </div>
        {layout.map((item, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: i < layout.length - 1 ? 12 : 0 }}>
            <div style={{ 
              width: 24, height: 24, borderRadius: '50%', background: 'var(--accent-dim)',
              border: '1px solid rgba(240,165,0,0.3)', display: 'flex', alignItems: 'center', 
              justifyContent: 'center', fontSize: '0.7rem', fontWeight: 700, color: 'var(--accent)', flexShrink: 0
            }}>{i + 1}</div>
            <div style={{ fontSize: '0.88rem' }}>{item}</div>
          </div>
        ))}
      </div>

      {/* Tips */}
      <div className="card fade-up-delay-2" style={{ marginBottom: 24 }}>
        <div style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--accent)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 16 }}>
          Do's and don'ts
        </div>
        {tips.map((tip, i) => (
          <div key={i} className="cv-tip">
            <div style={{ fontSize: '1rem', flexShrink: 0 }}>{tip.icon}</div>
            <div style={{ fontSize: '0.83rem', color: 'var(--muted)', lineHeight: 1.6 }}>{tip.text}</div>
          </div>
        ))}
      </div>

      <button className="btn-ghost fade-up-delay-3" style={{ width: '100%' }} onClick={onBack}>← Back to results</button>
    </div>

}

// ─── Main App ─────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('welcome');
  const [plan, setPlan] = useState('single');
  const [cvFile, setCvFile] = useState(null);
  const [jobAd, setJobAd] = useState('');
  const [results, setResults] = useState(null);
  const [procMsg, setProcMsg] = useState(PROCESSING_MESSAGES[0]);
  const [error, setError] = useState('');

  // Cycle processing messages
  useEffect(() => {
    if (screen !== 'processing') return;
    let i = 0;
    const t = setInterval(() => {
      i = (i + 1) % PROCESSING_MESSAGES.length;
      setProcMsg(PROCESSING_MESSAGES[i]);
    }, 3000);
    return () => clearInterval(t);
  }, [screen]);

  // ── Extract CV text ──
  const extractCVText = async (file) => {
    const ext = file.name.toLowerCase();
    if (ext.endsWith('.pdf')) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve({ type: 'pdf', data: e.target.result.split(',')[1] });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    } else if (ext.endsWith('.docx')) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
            resolve({ type: 'text', data: result.value });
          } catch (err) { reject(err); }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }
    throw new Error('Unsupported file type');
  };

  // ── Call Claude API ──
  const analyseCV = async (file, jobAdText) => {
    setScreen('processing');
    setError('');

    try {
      const cv = await extractCVText(file);

      const systemPrompt = `You are an expert UK CV consultant specialising in helping recently redundant professionals return to the job market. You have deep knowledge of ATS (Applicant Tracking Systems), modern UK CV conventions, and what hiring managers actually look for.

Analyse the provided CV against the job advertisement and respond ONLY with a valid JSON object — no preamble, no markdown, no explanation, just the JSON.

Required JSON structure:
{
  "ats_score_before": <integer 0-100, honest assessment of ATS compatibility of the original CV>,
  "ats_score_after": <integer 0-100, ATS compatibility of your rewritten version>,
  "diagnostic": [
    {
      "category": "<short category, e.g. 'Keyword Gaps', 'Outdated Format', 'Weak Achievements'>",
      "issue": "<specific, honest, plain English explanation of the problem — 1-2 sentences>",
      "impact": "<'high', 'medium', or 'low'>"
    }
  ],
  "rewritten_cv": "<the full rewritten CV as plain text with clear sections separated by line breaks. Follow modern UK conventions: no photo, no DOB, no objective statement, no 'References available on request'. Include: Personal Profile, Core Skills, Work Experience with quantified achievements, Education. Tailor keywords to match the job ad.>"
}

Rules:
- Be honest and specific — vague feedback is useless to someone who needs a job
- Provide 4-8 diagnostic points
- The rewritten CV should be complete and professional, not a template
- Use warm, encouraging language — this person is dealing with redundancy
- UK English throughout
- Quantify achievements wherever possible, even if estimated`;

      let messages;
      if (cv.type === 'pdf') {
        messages = [{
          role: 'user',
          content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: cv.data } },
            { type: 'text', text: `Here is the job advertisement the candidate wants to apply for:\n\n${jobAdText}\n\nPlease analyse the CV against this job ad and return your JSON response.` }
          ]
        }];
      } else {
        messages = [{
          role: 'user',
          content: `Here is the candidate's CV:\n\n${cv.data}\n\n---\n\nHere is the job advertisement they want to apply for:\n\n${jobAdText}\n\nPlease analyse the CV against this job ad and return your JSON response.`
        }];
      }

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          system: systemPrompt,
          messages
        })
      });

      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const data = await res.json();
      const text = data.content.map(b => b.text || '').join('').trim();
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      setResults(parsed);
      setScreen('results');
    } catch (err) {
      console.error(err);
      setError('Something went wrong. Please try again.');
      setScreen('jobad');
    }
  };

  const handleReset = () => {
    setCvFile(null);
    setJobAd('');
    setResults(null);
    setScreen('upload');
  };

  return (
    <div className="app-wrap">
      {/* Header */}
      {screen !== 'welcome' && (
        <div style={{ 
          borderBottom: '1px solid var(--border)', 
          padding: '16px 20px',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          position: 'sticky', top: 0, background: 'rgba(13,17,23,0.92)',
          backdropFilter: 'blur(12px)', zIndex: 10
        }}>
          <span style={{ fontFamily: 'Playfair Display, serif', fontWeight: 700, fontSize: '1.2rem', color: 'var(--text)' }}>
            Hired<span style={{ color: 'var(--accent)' }}>Back</span>
          </span>
        </div>
      )}

      {/* Screens */}
      {screen === 'welcome' && (
        <div>
          <div style={{ 
            borderBottom: '1px solid var(--border)', 
            padding: '16px 20px',
            display: 'flex', alignItems: 'center', justifyContent: 'center'
          }}>
            <span style={{ fontFamily: 'Playfair Display, serif', fontWeight: 700, fontSize: '1.3rem', color: 'var(--text)' }}>
              Hired<span style={{ color: 'var(--accent)' }}>Back</span>
            </span>
          </div>
          <WelcomeScreen onStart={() => setScreen('payment')} />
        </div>
      )}

      {screen === 'payment' && (
        <PaymentScreen onPay={(p) => { setPlan(p); setScreen('upload'); }} />
      )}

      {screen === 'upload' && (
        <UploadScreen onUpload={(f) => { setCvFile(f); setScreen('jobad'); }} />
      )}

      {screen === 'jobad' && (
        <>
          {error && (
            <div style={{ 
              background: 'rgba(248,81,73,0.1)', border: '1px solid rgba(248,81,73,0.3)',
              margin: '16px 20px 0', borderRadius: 10, padding: '12px 16px',
              fontSize: '0.85rem', color: 'var(--danger)', display: 'flex', gap: 8
            }}>
              <IconAlert /> {error}
            </div>
          )}
          <JobAdScreen
            onSubmit={(j) => { setJobAd(j); analyseCV(cvFile, j); }}
            onBack={() => setScreen('upload')}
          />
        </>
      )}

      {screen === 'processing' && <ProcessingScreen message={procMsg} />}

      {screen === 'results' && results && (
        <ResultsScreen
          results={results}
          onReset={handleReset}
          onViewGuide={() => setScreen('guide')}
        />
      )}

      {screen === 'guide' && (
        <CVGuide onBack={() => setScreen('results')} />
      )}

      {/* Footer */}
      {screen === 'welcome' && (
        <div style={{ textAlign: 'center', padding: '24px 20px 40px', color: 'var(--muted)', fontSize: '0.75rem', borderTop: '1px solid var(--border)', marginTop: 40 }}>
          <div style={{ marginBottom: 8, fontFamily: 'Playfair Display, serif', color: 'var(--text)', fontSize: '0.9rem' }}>
            Hired<span style={{ color: 'var(--accent)' }}>Back</span>
          </div>
          Built for people who deserve better than redundancy. · UK-focused · Results in minutes
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
